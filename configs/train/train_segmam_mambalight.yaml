# SegMam — fine-tune entrypoint for the lightweight self_mamba variant
# (d_state 8->4, expand 2->1, obtained by structural pruning of the heavy variant).
#
# Warm-starts from the released slice-initialized lightweight checkpoint
# (segmam_pseudolidar_mambalight_sliced/model-000075000.pth), which already gives
# drivable IoU ALL=81.6 (DAY 83.5) at ~335 ms forward pass with NO additional
# training. Use this config only if you want to fine-tune further; the released
# checkpoint matches the paper's reported result as-is.
#
# Run with the env var so the model is built with the light self_mamba:
#   SEGMAM_MAMBA_LIGHT=1 python train.py --config configs/train/train_segmam_mambalight.yaml
#
# After training, evaluate with:
#   SEGMAM_MAMBA_LIGHT=1 python eval.py --config configs/eval/eval_segmam_mambalight.yaml
#   (point that config's init_dir/load_step to your run's checkpoint dir + step)

# model name
exp_name: 'SegMam_mambalight_ft'
# Training parameters
max_iters: 30000
log_freq: 100
shuffle: true
dset: 'trainval'
save_freq: 5000

batch_size: 1
grad_acc: 5
lr: 0.0001          # gentle: recovering ~2.4 IoU points from a good warm-start; don't disrupt pretrained parts
use_scheduler: true
weight_decay: 0.0000001
nworkers: 4

# Directories
data_dir: '/path/to/nuscenes/trainval'   # set to your nuScenes trainval root
custom_dataroot: 'datasets/scaled_images'
log_dir: 'logs_nuscenes'
ckpt_dir: './checkpoints'
keep_latest: 20
# Warm-start from the slice-initialized lightweight checkpoint (shapes already light => ignore_load not needed).
init_dir: './checkpoints/segmam_pseudolidar_mambalight_sliced'
ignore_load: null
# Fresh step counter / optimizer / scheduler — this is a new run (the sliced ckpt has no optimizer state anyway).
load_step: false
load_optimizer: false
load_scheduler: false

# Data parameters
final_dim: [448,896]  # to match //8, //14, //16 and //32 in Vit
rand_flip: true
rand_crop_and_resize: true
ncams: 6
nsweeps: 5

# Model parameters
encoder_type: 'dino_v2'
pseudolidar_encoder_type: 'voxel_net'
use_rpn_pseudolidar: false
train_task: 'both'
use_pseudolidar: true
use_pseudolidar_filters: false
use_pseudolidar_encoder: true
use_metapseudolidar: false

use_shallow_metadata: true
use_pre_scaled_imgs: false
use_obj_layer_only_on_map: true
init_query_with_image_feats: true
do_rgbcompress: true
do_shuffle_cams: true
use_multi_scale_img_feats: true
num_layers: 6

device_ids: [0]
freeze_dino: true
do_feat_enc_dec: true
combine_feat_init_w_learned_q: true
model_type: 'transformer'
use_pseudolidar_occupancy_map: false
learnable_fuse_query: true
